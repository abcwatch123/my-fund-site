<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>fieldsmock</title>
  <link rel="shortcut icon" href="favicon.png">
  <link rel="icon" type="image/png" href="favicon.png?v=2">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Baskerville, serif;
      margin: 0;
      background: #fff;
      color: #000;
    }

    /* === HEADER === */
    .site-header {
      position: fixed;
      top: 0;
      width: 100%;
      background: #fff;
      z-index: 100;
      box-sizing: border-box;
      padding-bottom: 8px;
    }

    .site-header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      padding: 16px 0;
      box-sizing: border-box;
    }

    .logo-with-text {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      text-decoration: none;
      color: #999999;
    }

    .logo-icon {
      width: 22px;
      height: 22px;
      display: block;
    }

    .site-name {
      font-size: 24px;
      font-weight: normal;
      color: #999999;
      user-select: none;
    }

    /* === LANDING === */
    .landing-brand {
      position: absolute;
      top: 25vh;
      transform: translateX(-50%) translateY(-50%);
      left: 50%;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .landing-links {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 52px;
    }

    .landing-brand img {
      width: 48px;
      height: 48px;
      display: block;
    }

    .landing-brand span {
      font-size: 48px;
      font-weight: normal;
      color: #999999;
      user-select: none;
      cursor: default;
    }

    .landing-links a {
      font-size: 42px;
      font-weight: normal;
      color: #999999;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .landing-links a:hover {
      color: rgba(153, 153, 153, 0);
    }

    @media (hover: none) {
      .landing-links a:hover,
      .landing-links a:active,
      .landing-links a:focus {
        color: #999999;
      }
    }

    @media (max-width: 600px) {
      .landing-brand img {
        width: 22px;
        height: 22px;
      }

      .landing-brand span {
        font-size: 24px;
      }

      .landing-links {
        gap: 24px;
      }

      .landing-links a {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>

<div class="landing-brand">
  <img src="favicon.png" alt="">
  <span>fieldsmock</span>
</div>

<main class="landing-links">
  <a href="ffi.html">ffi</a>
  <a href="letters.html">letters</a>
  <a href="about.html">about</a>
</main>

</body>
</html>
